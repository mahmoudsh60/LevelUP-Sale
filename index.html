    <style>
        :root {

        }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Tajawal', sans-serif; margin: 0; padding: 0; padding-bottom: 80px; }
        .top-info-bar { background-color: #000; color: var(--primary-color); padding: 8px 15px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; border-bottom: 1px solid #333; }

        header { background-color: #0d0d0d; padding: 20px 15px; text-align: center; border-bottom: 2px solid var(--primary-color); position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.6);}
        header h1 { margin: 0; font-size: 26px; font-weight: 900; letter-spacing: 1px; }
        header span { color: var(--primary-color); }
        .fb-link { display: inline-block; margin-top: 10px; background-color: var(--fb-color); color: white; padding: 5px 15px; border-radius: 20px; font-size: 13px; text-decoration: none; font-weight: bold; transition: 0.2s;}
        .fb-link:hover { transform: scale(1.05); }
        
        .container { max-width: 1200px; margin: auto; padding: 20px 15px; }
        .section-title { text-align: center; font-size: 24px; color: var(--primary-color); margin-bottom: 20px; font-weight: 900; }
        
        /* ======== البحث والفلترة ======== */
        .search-box { display: flex; gap: 8px; margin-bottom: 15px; }
        .search-box input { flex: 1; padding: 12px 15px; border-radius: 8px; border: 1px solid #444; background-color: var(--card-bg); color: white; font-family: 'Tajawal', sans-serif; font-size: 15px; }
        .search-box button { background-color: var(--primary-color); color: #000; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; font-family: 'Tajawal', sans-serif; cursor: pointer; font-size: 15px; transition: 0.2s;}
        .search-box button:hover { background-color: var(--primary-hover); }
        
        .filter-section { margin-bottom: 25px; background: #1a1a20; padding: 15px; border-radius: 8px; border: 1px solid #333; }
        .filter-title { font-size: 14px; color: var(--primary-color); margin-bottom: 10px; font-weight: bold; }
        .filter-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .filter-group:last-child { margin-bottom: 0; }
        .filter-btn { background-color: #2a2a35; color: var(--text-main); border: 1px solid #444; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-family: 'Tajawal', sans-serif; font-size: 13px; transition: 0.2s; }
        .filter-btn.active { background-color: var(--primary-color); color: #000; border-color: var(--primary-color); font-weight: bold; }
        
        /* ======== كروت الألعاب ======== */
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background-color: var(--card-bg); border-radius: 12px; overflow: hidden; box-shadow: 0 6px 12px rgba(0,0,0,0.4); display: flex; flex-direction: column; border: 1px solid #333; transition: transform 0.2s, border-color 0.2s; }
        .card:hover { transform: translateY(-5px); border-color: var(--primary-color); }
        
        /* حاوية الصورة للاحتفاظ بالمقاس الثابت والتأثيرات */
        .card-img-container { width: 100%; height: 200px; overflow: hidden; position: relative; border-bottom: 2px solid var(--primary-color); cursor: pointer;}
        .card-img-container img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; }
        .card:hover .card-img-container img { transform: scale(1.1); }
        
        .card-header { background-color: #17171c; padding: 12px 10px; text-align: center; }
        .game-title { color: var(--text-main); font-size: 17px; font-weight: 700; margin: 0; line-height: 1.4; }
        
        .card-content { padding: 15px; flex: 1; display: flex; flex-direction: column; }
        .tags { margin-bottom: 12px; text-align: center; }
        .tag { display: inline-block; background-color: #2a2a35; font-size: 11px; padding: 4px 8px; border-radius: 6px; margin: 2px; color: var(--primary-color); border: 1px solid #444;}
        
        .info-row { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 14px; font-weight: bold; background: #121212; padding: 8px 10px; border-radius: 6px; border: 1px dashed #333;}
        
        .card-actions { margin-top: auto; display: flex; gap: 8px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 6px; font-family: 'Tajawal', sans-serif; font-weight: bold; cursor: pointer; text-align: center; text-decoration: none; font-size: 14px; transition: 0.2s;}
        .btn-add { background-color: var(--primary-color); color: #000; }
        .btn-add:hover { background-color: var(--primary-hover); }
        .btn-add.added { background-color: var(--danger); color: white; }
        .btn-add.added:hover { background-color: var(--danger-hover); }
        .btn-out { background-color: #2a2a35; color: #777; cursor: not-allowed; border: 1px solid #444;}
        
        /* ======== السلة ======== */
        .cart-float { position: fixed; bottom: 20px; left: 20px; background-color: var(--primary-color); color: #000; padding: 15px 25px; border-radius: 30px; font-weight: bold; font-family: 'Tajawal', sans-serif; font-size: 16px; box-shadow: 0 5px 15px rgba(0, 255, 204, 0.4); cursor: pointer; border: none; z-index: 1000; display: flex; align-items: center; gap: 8px; transition: 0.2s;}

        .cart-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 1001; justify-content: center; align-items: center; padding: 15px; }
        .cart-content { background-color: var(--card-bg); width: 100%; max-width: 500px; border-radius: 12px; padding: 20px; max-height: 90vh; overflow-y: auto; border: 2px solid var(--primary-color); display: flex; flex-direction: column; }
        .cart-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; padding-bottom: 15px; margin-bottom: 15px; }
        .user-info-section { margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; }
        .user-info-section input { padding: 12px; border-radius: 8px; border: 1px solid #444; background-color: #2a2a35; color: white; font-family: 'Tajawal', sans-serif; }
        .cart-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px dashed #333; }
        .btn-empty-cart { background-color: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 5px 10px; border-radius: 6px; font-family: 'Tajawal', sans-serif; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .btn-empty-cart:hover { background-color: var(--danger); color: white; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 14px; border-bottom: 1px dashed #333; padding-bottom: 8px; }
        .cart-summary { background-color: #2a2a35; padding: 15px; border-radius: 8px; margin-top: 15px; text-align: center; border: 1px solid #444;}
        .cart-summary h3 { margin: 0 0 5px 0; color: var(--text-muted); font-size: 14px; }
        .cart-summary h2 { margin: 0 0 15px 0; color: var(--text-main); font-size: 20px;}

        @media (max-width: 600px) { .top-info-bar { flex-direction: column; gap: 5px; text-align: center; } header h1 { font-size: 22px; } }

            { id: 40, name: "Unravel 2", genres: ["مغامرات", "العاب عائلية"], playersTxt: "1 - 2", maxPlayers: 2, minSize: 4, maxSize: 4, price: 50, stock: 14, image: "images/Unravel 2.jpg", desc: "لعبة منصات ذكية ومبهجة تعتمد على التعاون لحل الألغاز." }
        ];

        let cart = [];
        let activeGenres = [];

        function toggleFilter(type, value, btnElement) {
            btnElement.classList.toggle('active');
            if(type === 'genre') {
                if(activeGenres.includes(value)) activeGenres = activeGenres.filter(g => g !== value);
                else activeGenres.push(value);
            } 
            renderGames();
        }

        function handleEnter(e) { if(e.key === 'Enter') renderGames(); }

        function sortCartAlphabetically() {
            cart.sort((a, b) => a.name.localeCompare(b.name, 'en', { sensitivity: 'base' }));
        }

        // دالة إضافة اللعبة مع التحقق من الرصيد (Stock)
        function toggleCart(id, event) {
            if(event) event.stopPropagation(); // لمنع فتح التفاصيل عند الضغط على زرار الإضافة من الخارج
            
            const game = gamesDB.find(g => g.id === id);
            if (!game || game.stock <= 0) return; // حماية لعدم إضافة لعبة خلصت من الجرد

            const index = cart.findIndex(g => g.id === id);
            if(index > -1) {
                cart.splice(index, 1);
            } else {
                cart.push(game);
            }
            sortCartAlphabetically();
            updateCartUI();
            renderGames();
            
            // تحديث حالة الزرار داخل النافذة المنبثقة لو كانت مفتوحة
            if(document.getElementById('gameDetailsModal').style.display === 'flex') {
                openGameDetails(id);
            }
        }

        function clearCart() {
            cart = [];
            updateCartUI();
            renderGames();
        }

        // دالة فتح النافذة المنبثقة (Modal) للتفاصيل
        function openGameDetails(id) {
            const game = gamesDB.find(g => g.id === id);
            if(!game) return;

            document.getElementById('detailName').innerText = game.name;
            document.getElementById('detailImage').src = game.image;
            document.getElementById('detailDesc').innerHTML = game.desc;
            document.getElementById('detailSize').innerText = `💾 المساحة: ${game.maxSize} GB`;
            document.getElementById('detailPrice').innerText = `💰 السعر: ${game.price} جنيه`;

            const actionContainer = document.getElementById('detailActionContainer');
            
            if (game.stock <= 0) {
                // شكل الزرار لو اللعبة غير متوفرة
                actionContainer.innerHTML = `<button class="btn btn-out" style="width: 100%; padding: 15px; font-size: 16px;" disabled>نفذت الكمية حالياً ❌</button>`;
            } else {
                // شكل الزرار لو اللعبة متاحة (تتغير حسب وجودها في السلة)
                const inCart = cart.some(c => c.id === game.id);
                const btnColor = inCart ? 'var(--danger)' : 'var(--primary-color)';
                const btnText = inCart ? '❌ إزالة اللعبة من عرضي' : '➕ إضافة اللعبة لعرضي';
                const btnTextColor = inCart ? 'white' : '#000';
                
                actionContainer.innerHTML = `<button class="btn" style="width: 100%; padding: 15px; font-size: 16px; background-color: ${btnColor}; color: ${btnTextColor}; border: none; cursor:pointer;" onclick="toggleCart(${game.id})">${btnText}</button>`;
            }

            document.getElementById('gameDetailsModal').style.display = 'flex';
        }

        function closeGameDetails() {
            document.getElementById('gameDetailsModal').style.display = 'none';
        }

        function renderGames() {
            const grid = document.getElementById('gamesGrid');
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            grid.innerHTML = '';
            
            gamesDB.forEach(game => {
                if (searchText && !game.name.toLowerCase().includes(searchText)) return;
                if (activeGenres.length > 0 && !game.genres.some(g => activeGenres.includes(g))) return;

                const inCart = cart.some(c => c.id === game.id);
                let tagsHTML = game.genres.map(g => `<span class="tag">${g}</span>`).join('');
                let sizeDisplay = (game.minSize === game.maxSize) ? `${game.minSize} GB` : `${game.minSize}-${game.maxSize} GB`;
                
                // تحديد شكل الزرار الخارجي للكارت بناءً على الرصيد
                let buttonHTML = '';
                if (game.stock <= 0) {
                    buttonHTML = `<button class="btn btn-out" disabled>غير متوفرة ❌</button>`;
                } else {
                    buttonHTML = `<button class="btn ${inCart ? 'btn-add added' : 'btn-add'}" onclick="toggleCart(${game.id}, event)">
                                    ${inCart ? '❌ إزالة' : '➕ إضافـة'}
                                  </button>`;
                }

                grid.innerHTML += `
                    <div class="card">
                        <div class="card-img-container" onclick="openGameDetails(${game.id})">
                            <img src="${game.image}" alt="${game.name}">
                        </div>
                        
                        <div class="card-content">
                            <div class="card-header" style="background: transparent; border: none; padding: 0 0 10px 0;">
                                <h3 class="game-title" style="cursor: pointer;" onclick="openGameDetails(${game.id})">${game.name}</h3>
                            </div>
                            
                            <div class="tags">${tagsHTML}</div>
                            
                            <div class="info-row">
                                <span style="color: var(--accent-color);">💰 ${game.price} ج</span>
                                <span style="color: #ddd;" dir="ltr">💾 ${sizeDisplay}</span>
                            </div>
                            
                            <div class="card-actions">
                                ${buttonHTML}
                            </div>
                        </div>
                    </div>`;
            });
        }

        function updateCartUI() {
            document.getElementById('cartCount').innerText = cart.length;
            const list = document.getElementById('cartItemsList');
            list.innerHTML = '';
            
            let minTotal = 0, maxTotal = 0, totalPrice = 0;
            
            if(cart.length === 0) {
                list.innerHTML = '<p style="text-align:center; color:#aaa; font-size:14px; padding: 15px 0;">لم تختر أي ألعاب بعد.</p>';
            }
            
            cart.forEach(item => {
                minTotal += item.minSize; 
                maxTotal += item.maxSize;
                totalPrice += item.price; 
                
                let itemSizeText = (item.minSize === item.maxSize) ? `${item.minSize} GB` : `${item.minSize}-${item.maxSize} GB`;
                list.innerHTML += `
                    <div class="cart-item">
                        <span style="font-weight: bold;">${item.name}</span>
                        <span>
                            <span style="color:var(--accent-color); font-weight:bold; margin-left:10px;">${item.price} ج</span>
                            <span style="color:var(--primary-color);" dir="ltr">${itemSizeText}</span>
                        </span>
                    </div>`;
            });
            
            document.getElementById('totalSizeUI').innerText = (minTotal === maxTotal) ? `${minTotal} GB` : `${minTotal} - ${maxTotal} GB`;
            document.getElementById('totalPriceUI').innerText = `${totalPrice} جنيه`;
        }

        function openCart() { document.getElementById('cartModal').style.display = 'flex'; }
        function closeCart() { document.getElementById('cartModal').style.display = 'none'; }

        function sendWhatsApp(phone) {
            const name = document.getElementById('userName').value.trim();
            const contact = document.getElementById('userPhone').value.trim();
            
            if(!name || !contact) { alert("من فضلك اكتب اسمك ورقم الموبايل أولاً!"); return; }
            if(cart.length === 0) { alert("يرجى اختيار ألعاب أولاً لتكوين عرضك!"); return; }

            let minTotal = 0, maxTotal = 0, totalPrice = 0;
            let text = `مرحباً LevelUP،\nأنا ${name} (رقمي: ${contact})\nأريد حجز هذا العرض لجهازي (PS4 / PS5):\n\n`;
            
            let gamesForSheetText = ""; 
            let gamesArrayForInventory = []; // تجهيز الأسماء لخصم الجرد
            
            cart.forEach((game, index) => {
                let sizeTxt = (game.minSize === game.maxSize) ? `${game.minSize} GB` : `${game.minSize}-${game.maxSize} GB`;
                text += ` ${index + 1}. ${game.name} - ${game.price} ج (${sizeTxt})\n`;
                
                gamesForSheetText += `${index + 1}. ${game.name}\n`;
                gamesArrayForInventory.push(game.name);
                
                minTotal += game.minSize; 
                maxTotal += game.maxSize;
                totalPrice += game.price;
            });
            
            let finalTotalTxt = (minTotal === maxTotal) ? `${minTotal} GB` : `من ${minTotal} إلى ${maxTotal} GB`;
            text += `\nإجمالي المساحة: ${finalTotalTxt}`;
            text += `\nالسعر الإجمالي: ${totalPrice} جنيه.`;

            // الإرسال في الخلفية إلى Google Sheets (مرفق معاها مصفوفة الألعاب لخصم الجرد)
            fetch(GOOGLE_SHEET_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: name,
                    phone: contact,
                    deviceType: "PS4 / PS5",
                    games: gamesForSheetText,
                    totalSize: finalTotalTxt,
                    gameNamesArray: gamesArrayForInventory 
                })
            }).catch(error => console.log('خطأ في التسجيل:', error));

            alert("تم إرسال طلبك بنجاح! جاري تحويلك للواتساب لإتمام الحجز...");
            clearCart();
            closeCart();
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(text)}`, '_blank');
        }

        renderGames(); 
        updateCartUI();
    </script>
